<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>טרנספורמציות של פונקציות</title>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)'], ['$', '$']],
        displayMath: [['\\[','\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    :root{
      --bg:#0b1020;
      --panel:#121933;
      --panel2:#1a2344;
      --text:#eef2ff;
      --muted:#b9c4ea;
      --accent:#6ea8fe;
      --accent2:#8ef0c9;
      --warn:#ffd166;
      --danger:#ff7b7b;
      --grid:#2b3768;
      --border:#31406f;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:20px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top right, #203060 0, transparent 28%),
        radial-gradient(circle at top left, #17314a 0, transparent 22%),
        linear-gradient(180deg, #09101f, #0c1327 45%, #0b1020 100%);
      color:var(--text);
    }

    .app{
      min-height:100vh;
      padding:18px;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:16px;
    }

    .hero, .panel{
      padding:16px;
      width:100%;
      min-width:0;
    }

    .hero{
      padding:10px 12px;
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:16px;
      align-items:center;
    }

    .hero h1{
      margin:0 0 10px 0;
      font-size:2rem;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .formula-box{
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .formula-title{
      color:var(--accent2);
      font-weight:700;
      margin-bottom:10px;
    }

    .top-row{
      display:grid;
      grid-template-columns:1.4fr .9fr;
      gap:16px;
      align-items:stretch;
    }

    .panel{
      padding:16px;
    }

    #plot{
      width:100% !important;
      height:100% !important;
      min-height:520px;
      display:block;
      border-radius:16px;
      overflow:hidden;
    }

    .controls{
      display:grid;
      gap:12px;
    }

    .control-group{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px 14px;
    }

    .control-group h3{
      margin:0 0 10px 0;
      font-size:1rem;
      color:var(--accent2);
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:8px 0;
    }

    label{
      font-weight:700;
    }

    select, button, input[type="range"], input[type="number"]{
      font:inherit;
    }

    select, input[type="number"]{
      background:#0d1530;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      min-width:160px;
    }

    .btn{
      background:#152041;
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      transition:.2s ease;
      font-weight:700;
    }

    .btn:hover{transform:translateY(-1px); border-color:var(--accent)}
    .btn.active{outline:2px solid var(--accent2); background:#183259}

    .slider-wrap{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
      margin:8px 0;
    }

    input[type="range"]{
      width:100%;
      accent-color:#7ec8ff;
    }

    .value{
      min-width:72px;
      text-align:center;
      background:#0e1733;
      border:1px solid var(--border);
      border-radius:10px;
      padding:8px 10px;
      font-weight:700;
      direction:ltr;
    }

    .func-options{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-top:10px;
    }

    .func-btn{
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      direction:ltr;
      font-size:1.02rem;
    }

    .func-btn mjx-container{
      font-size: 115% !important;
    }

    .bottom-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .info-card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      height:100%;
    }

    .info-card h3{
      margin:0 0 10px 0;
      color:var(--warn);
    }

    .explain{
      color:var(--muted);
      line-height:1.7;
    }

    .math-line{
      background:#0f1631;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      margin:8px 0;
      overflow:auto;
      direction:ltr;
      text-align:left;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border:1px solid var(--border);
      border-radius:999px;
      background:#101936;
      color:var(--muted);
      font-size:.95rem;
      margin:3px;
    }

    #transformationBreakdown{
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:.95rem;
      padding:4px 0 10px;
    }

    @media (max-width: 1200px){
      .top-row, .bottom-row, .hero{grid-template-columns:1fr}
    }

    @media (max-width: 700px){
      #plot{
      width:100% !important;
      height:100% !important;
      min-height:520px;
      display:block;
      border-radius:16px;
      overflow:hidden;
    }
      .func-options{grid-template-columns:repeat(2, minmax(0,1fr));}
    }
  
    .top-row > .panel{
      min-width:0;
    }

    .js-plotly-plot,
    .plot-container,
    .svg-container{
      width:100% !important;
    }

  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div>
        <h1>מעבדת טרנספורמציות של פונקציות</h1>
      </div>
        <div class="math-line">\( f(x)+k \), \( f(x+k) \), \( -f(x) \), \( f(-x) \), \( |f(x)| \), \( kf(x) \), \( f(kx) \), \( [f(x)]^n \)</div>
    </section>

    <section class="top-row">
      <div class="panel">
        <div id="plot"></div>
      </div>

      <div class="panel">
        <div class="controls">
          <div class="control-group">
            <div class="func-options" id="funcOptions">
              <button type="button" class="btn func-btn active" data-func="quadratic">\(f(x)=x^2\)</button>
              <button type="button" class="btn func-btn" data-func="abs">\(f(x)=|x|\)</button>
              <button type="button" class="btn func-btn" data-func="sqrt">\(f(x)=\sqrt{x}\)</button>
              <button type="button" class="btn func-btn" data-func="sin">\(f(x)=\sin(x)\)</button>
              <button type="button" class="btn func-btn" data-func="cubic">\(f(x)=x^3\)</button>
              <button style="font-size: 12px;" type="button" class="btn func-btn" data-func="poly3">\(f(x)=(x+3)(x-2)(x-1)\)</button>
            </div>
            <input type="hidden" id="baseFunc" value="quadratic">
          </div>

          <div class="control-group">
            <label>הזזה אנכית: \( f(x)+k \)</label>
            <div class="slider-wrap">
              <input type="range" id="verticalShift" min="-8" max="8" step="0.5" value="0">
              <div class="value" id="verticalShiftVal">0</div>
            </div>

            <label>הזזה אופקית: \( f(x+k) \)</label>
            <div class="slider-wrap">
              <input type="range" id="horizontalShift" min="-8" max="8" step="0.5" value="0">
              <div class="value" id="horizontalShiftVal">0</div>
            </div>

            <label>מתיחה/כיווץ אנכי: \( kf(x) \)</label>
            <div class="slider-wrap">
              <input type="range" id="verticalScale" min="-3" max="3" step="0.1" value="1">
              <div class="value" id="verticalScaleVal">1</div>
            </div>

            <label>מתיחה/כיווץ אופקי: \( f(kx) \)</label>
            <div class="slider-wrap">
              <input type="range" id="horizontalScale" min="-3" max="3" step="0.1" value="1">
              <div class="value" id="horizontalScaleVal">1</div>
            </div>

            <label>חזקה טבעית: \( [f(x)]^n \)</label>
            <div class="slider-wrap">
              <input type="range" id="powerN" min="1" max="6" step="1" value="1">
              <div class="value" id="powerNVal">1</div>
            </div>
          </div>

          <div class="control-group">
            <div class="row">
              <button class="btn toggle-btn" id="negYBtn">שיקוף אנכי: \( -f(x) \)</button>
              <button class="btn toggle-btn" id="negXBtn">שיקוף אופקי: \( f(-x) \)</button>
              <button class="btn toggle-btn" id="absBtn">ערך מוחלט: \( |f(x)| \)</button>
              <button class="btn" id="resetBtn">איפוס מלא</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="bottom-row">
      <div class="panel">
        <div class="info-card">
          <h3>הביטוי הנוכחי</h3>
          <div id="currentFormula" class="math-line">\(g(x)=x^2\)</div>
          <div id="comparisonFormula" class="math-line">\(g(x)=f(x)\)</div>
          <div id="transformationBreakdown" class="explain"></div>
          <div id="summaryText" class="explain"></div>
        </div>
      </div>

      <div class="panel">
        <div class="info-card">
          <h3>מעקב אחרי נקודה</h3>
          <div class="row">
            <label for="pointX">בחר \(x\):</label>
            <input type="number" id="pointX" step="0.5" value="1" />
          </div>
          <div id="pointInfo" class="explain"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const els = {
      baseFunc: document.getElementById('baseFunc'),
      verticalShift: document.getElementById('verticalShift'),
      horizontalShift: document.getElementById('horizontalShift'),
      verticalScale: document.getElementById('verticalScale'),
      horizontalScale: document.getElementById('horizontalScale'),
      powerN: document.getElementById('powerN'),
      verticalShiftVal: document.getElementById('verticalShiftVal'),
      horizontalShiftVal: document.getElementById('horizontalShiftVal'),
      verticalScaleVal: document.getElementById('verticalScaleVal'),
      horizontalScaleVal: document.getElementById('horizontalScaleVal'),
      powerNVal: document.getElementById('powerNVal'),
      negYBtn: document.getElementById('negYBtn'),
      negXBtn: document.getElementById('negXBtn'),
      absBtn: document.getElementById('absBtn'),
      resetBtn: document.getElementById('resetBtn'),
      pointX: document.getElementById('pointX'),
      pointInfo: document.getElementById('pointInfo'),
      currentFormula: document.getElementById('currentFormula'),
      comparisonFormula: document.getElementById('comparisonFormula'),
      transformationBreakdown: document.getElementById('transformationBreakdown'),
      summaryText: document.getElementById('summaryText'),
      funcOptions: document.getElementById('funcOptions')
    };

    const functionMathMap = {
      quadratic: '\\(f(x)=x^2\\)',
      abs: '\\(f(x)=|x|\\)',
      sqrt: '\\(f(x)=\\sqrt{x}\\)',
      sin: '\\(f(x)=\\sin(x)\\)',
      cubic: '\\(f(x)=x^3\\)',
      poly3: '\\(f(x)=(x+3)(x-2)(x-1)\\)'
    };

    const baseDefs = {
      quadratic: {
        latex: 'x^2',
        fn: x => x * x,
        domain: x => true
      },
      abs: {
        latex: '|x|',
        fn: x => Math.abs(x),
        domain: x => true
      },
      sqrt: {
        latex: '\\sqrt{x}',
        fn: x => Math.sqrt(x),
        domain: x => x >= 0
      },
      sin: {
        latex: '\\sin(x)',
        fn: x => Math.sin(x),
        domain: x => true
      },
      cubic: {
        latex: 'x^3',
        fn: x => x * x * x,
        domain: x => true
      },
      poly3: {
        latex: '(x+3)(x-2)(x-1)',
        fn: x => (x + 3) * (x - 2) * (x - 1),
        domain: x => true
      }
    };

    const state = {
      reflectY: false,
      reflectX: false,
      absY: false,
      sequenceCounter: 0,
      orderMap: {}
    };

    function fmt(n){
      return Number(n).toFixed(1).replace(/\.0$/,'');
    }

    function setLatex(el, latex){
      el.innerHTML = `\\(${latex}\\)`;
    }


    function wrap(expr){
      return `(${expr})`;
    }

    function isWrappedByOuterParens(expr){
      if(!expr || expr[0] !== '(' || expr[expr.length - 1] !== ')') return false;
      let depth = 0;
      for(let i = 0; i < expr.length; i++){
        const ch = expr[i];
        if(ch === '(') depth++;
        else if(ch === ')'){
          depth--;
          if(depth === 0 && i < expr.length - 1) return false;
        }
      }
      return depth === 0;
    }

    function hasTopLevelAddSub(expr){
      let depth = 0;
      for(let i = 0; i < expr.length; i++){
        const ch = expr[i];
        if(ch === '(') depth++;
        else if(ch === ')') depth--;
        else if(depth === 0 && i > 0 && (ch === '+' || ch === '-')) return true;
      }
      return false;
    }

    function parenIfNeededForOuterAddSub(expr){
      if(!expr) return expr;
      return hasTopLevelAddSub(expr) && !isWrappedByOuterParens(expr) ? wrap(expr) : expr;
    }

    function parenIfNeededForPower(expr){
      if(!expr) return expr;
      if(isWrappedByOuterParens(expr)) return expr;
      if(/^[a-zA-Z0-9\\]+$/.test(expr)) return expr;
      if(/^\|.*\|$/.test(expr)) return expr;
      return wrap(expr);
    }

    function signed(n){
      const v = Number(n);
      if (Math.abs(v) < 0.0001) return '';
      return v >= 0 ? `+${fmt(v)}` : `${fmt(v)}`;
    }

    function addSignedToExpr(expr, amount){
      const delta = signed(amount);
      if(!delta) return expr;
      return `${parenIfNeededForOuterAddSub(expr)}${delta}`;
    }

    function argNeedsParens(expr){
      if(!expr) return false;
      return hasTopLevelAddSub(expr) && !isWrappedByOuterParens(expr);
    }

    function wrapArgIfNeeded(expr){
      return argNeedsParens(expr) ? wrap(expr) : expr;
    }

    function addToArg(expr, amount){
      const delta = signed(amount);
      if(!delta) return expr;
      return `${wrapArgIfNeeded(expr)}${delta}`;
    }

    function scaleArg(expr, factor){
      const k = fmt(factor);
      if(k === '1') return expr;
      if(k === '-1') return negateArg(expr);
      return `${k}${wrapArgIfNeeded(expr)}`;
    }

    function negateArg(expr){
      if(expr === 'x') return '-x';
      if(isWrappedByOuterParens(expr)) return `-${expr}`;
      return hasTopLevelAddSub(expr) ? `-(${expr})` : `-${expr}`;
    }

    function renderBase(kind, arg){
      const a = String(arg).trim();
      switch(kind){
        case 'quadratic':
          return `${parenIfNeededForPower(a)}^2`;
        case 'abs':
          return `|${a}|`;
        case 'sqrt':
          return `\\sqrt{${a}}`;
        case 'sin':
          return `\\sin(${a})`;
        case 'cubic':
          return `${parenIfNeededForPower(a)}^3`;
        case 'poly3': {
          const aa = wrapArgIfNeeded(a);
          return `(${aa}+3)(${aa}-2)(${aa}-1)`;
        }
        default:
          return a;
      }
    }

    function scaleOuterExpr(expr, factor){
      const k = fmt(factor);
      if(k === '1') return expr;
      if(k === '-1') return `-${parenIfNeededForOuterAddSub(expr)}`;
      const wrapped = hasTopLevelAddSub(expr) && !isWrappedByOuterParens(expr) ? wrap(expr) : expr;
      return `${k}${wrapped}`;
    }

    function reflectOuterExpr(expr){
      return `-${parenIfNeededForOuterAddSub(expr)}`;
    }

    function powerOuterExpr(expr, n){
      return `${parenIfNeededForPower(expr)}^{${n}}`;
    }

    function activeStateById(id){
      const p = getParams();
      switch(id){
        case 'verticalShift': return Math.abs(p.vShift) > 0.0001;
        case 'horizontalShift': return Math.abs(p.hShift) > 0.0001;
        case 'verticalScale': return Math.abs(p.vScale - 1) > 0.0001;
        case 'horizontalScale': return Math.abs(p.hScale - 1) > 0.0001;
        case 'powerN': return p.powerN > 1;
        case 'reflectY': return state.reflectY;
        case 'reflectX': return state.reflectX;
        case 'absY': return state.absY;
        default: return false;
      }
    }

    function touchOperation(id){
      if(activeStateById(id)){
        state.sequenceCounter += 1;
        state.orderMap[id] = state.sequenceCounter;
      } else {
        delete state.orderMap[id];
      }
    }

    function getActiveOpsInOrder(){
      const ids = Object.keys(state.orderMap).filter(id => activeStateById(id));
      ids.sort((a,b) => state.orderMap[a] - state.orderMap[b]);
      return ids;
    }

    function getParams(){
      return {
        base: els.baseFunc.value,
        vShift: Number(els.verticalShift.value),
        hShift: Number(els.horizontalShift.value),
        vScale: Number(els.verticalScale.value),
        hScale: Number(els.horizontalScale.value),
        powerN: Number(els.powerN.value)
      };
    }

    function updateValueDisplays(){
      els.verticalShiftVal.textContent = fmt(els.verticalShift.value);
      els.horizontalShiftVal.textContent = fmt(els.horizontalShift.value);
      els.verticalScaleVal.textContent = fmt(els.verticalScale.value);
      els.horizontalScaleVal.textContent = fmt(els.horizontalScale.value);
      els.powerNVal.textContent = String(els.powerN.value);
    }

    function setBaseFunction(kind){
      els.baseFunc.value = kind;
      document.querySelectorAll('.func-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.func === kind);
      });
      updateAll();
    }

    function exprFromBase(kind){
      return renderBase(kind, 'x');
    }

    function evalBase(kind, x){
      const base = baseDefs[kind];
      if(!base.domain(x)) return null;
      const y = base.fn(x);
      return Number.isFinite(y) ? y : null;
    }


    function buildPipeline(){
      const p = getParams();
      const ops = getActiveOpsInOrder();

      let evalFn = (x) => evalBase(p.base, x);
      let argExpr = 'x';
      let explicitOuter = '__BASE__';
      let comparisonOuter = 'f(__ARG__)';
      const steps = [];

      for(const op of ops){
        if(op === 'verticalShift'){
          const k = p.vShift;
          const prev = evalFn;
          evalFn = (x) => {
            const y = prev(x);
            return y === null ? null : y + k;
          };
          explicitOuter = addSignedToExpr(explicitOuter, k);
          comparisonOuter = addSignedToExpr(comparisonOuter, k);
          steps.push(`הזזה אנכית ב־${fmt(k)} יחידות`);
        }

        if(op === 'horizontalShift'){
          const k = p.hShift;
          const prev = evalFn;
          evalFn = (x) => prev(x + k);
          argExpr = addToArg(argExpr, k);
          steps.push(k > 0 ? `הזזה אופקית שמאלה ב־${fmt(k)} יחידות` : `הזזה אופקית ימינה ב־${fmt(Math.abs(k))} יחידות`);
        }

        if(op === 'verticalScale'){
          const k = p.vScale;
          const prev = evalFn;
          evalFn = (x) => {
            const y = prev(x);
            return y === null ? null : k * y;
          };
          explicitOuter = scaleOuterExpr(explicitOuter, k);
          comparisonOuter = scaleOuterExpr(comparisonOuter, k);
          steps.push(`שינוי אנכי במקדם ${fmt(k)}`);
        }

        if(op === 'horizontalScale'){
          const k = p.hScale;
          const prev = evalFn;
          evalFn = (x) => prev(k * x);
          argExpr = scaleArg(argExpr, k);
          steps.push(`שינוי אופקי במקדם ${fmt(k)}`);
        }

        if(op === 'reflectY'){
          const prev = evalFn;
          evalFn = (x) => {
            const y = prev(x);
            return y === null ? null : -y;
          };
          explicitOuter = reflectOuterExpr(explicitOuter);
          comparisonOuter = reflectOuterExpr(comparisonOuter);
          steps.push('שיקוף ביחס לציר x');
        }

        if(op === 'reflectX'){
          const prev = evalFn;
          evalFn = (x) => prev(-x);
          argExpr = negateArg(argExpr);
          steps.push('שיקוף ביחס לציר y');
        }

        if(op === 'absY'){
          const prev = evalFn;
          evalFn = (x) => {
            const y = prev(x);
            return y === null ? null : Math.abs(y);
          };
          explicitOuter = `|${explicitOuter}|`;
          comparisonOuter = `|${comparisonOuter}|`;
          steps.push('הפעלת ערך מוחלט');
        }

        if(op === 'powerN'){
          const n = p.powerN;
          const prev = evalFn;
          evalFn = (x) => {
            const y = prev(x);
            return y === null ? null : Math.pow(y, n);
          };
          explicitOuter = powerOuterExpr(explicitOuter, n);
          comparisonOuter = powerOuterExpr(comparisonOuter, n);
          steps.push(`העלאה בחזקה ${n}`);
        }
      }

      const baseRendered = renderBase(p.base, argExpr);
      const explicitExpr = explicitOuter.replace('__BASE__', baseRendered);
      const comparisonExpr = comparisonOuter.replace('__ARG__', argExpr);
      return { evalFn, explicitExpr, comparisonExpr, steps, ops };
    }
    function computeOriginalPoint(x){
      const y = evalBase(getParams().base, x);
      return y === null ? null : {x, y};
    }

    function computeNewPoint(x){
      const pipe = buildPipeline();
      const y = pipe.evalFn(x);
      return y === null ? null : {x, y};
    }

    function makeXs(){
      const xs = [];
      for(let x = -10; x <= 10.0001; x += 0.05){
        xs.push(Number(x.toFixed(4)));
      }
      return xs;
    }

    function buildSeries(fn){
      const xs = makeXs();
      const outX = [];
      const outY = [];
      for(const x of xs){
        const y = fn(x);
        if(y !== null && Number.isFinite(y)){
          outX.push(x);
          outY.push(y);
        }
      }
      return {x: outX, y: outY};
    }

    function updateTexts(){
      const pipe = buildPipeline();
      setLatex(els.currentFormula, `g(x)=${pipe.explicitExpr}`);
      setLatex(els.comparisonFormula, `g(x)=${pipe.comparisonExpr}`);

      if(pipe.steps.length === 0){
        els.transformationBreakdown.innerHTML = 'כרגע אין טרנספורמציה פעילה.';
        els.summaryText.innerHTML = 'כרגע הגרף החדש זהה לגרף הבסיסי.';
      } else {
        els.transformationBreakdown.innerHTML =
          '<strong>סדר הפעלה:</strong><br>' +
          pipe.steps.map((s, i) => `${i+1}. ${s}`).join('<br>');
        els.summaryText.innerHTML =
          ``;
      }

      const px = Number(els.pointX.value);
      const op = computeOriginalPoint(px);
      const np = computeNewPoint(px);

      if(!op){
        els.pointInfo.innerHTML = `הנקודה המקורית אינה בתחום ההגדרה עבור \\(x=${fmt(px)}\\).`;
      } else if(!np){
        els.pointInfo.innerHTML = `אחרי הפעלת הטרנספורמציות, \\(x=${fmt(px)}\\) אינו נותן ערך מוגדר.`;
      } else {
        els.pointInfo.innerHTML = `
          <span class="pill">\\(f(${fmt(px)})=${fmt(op.y)}\\)</span>
          <span class="pill">\\(g(${fmt(px)})=${fmt(np.y)}\\)</span>
        `;
      }

      if(window.MathJax && MathJax.typesetPromise){
        MathJax.typesetPromise();
      }
    }

    function updatePlot(){
      updateValueDisplays();

      const p = getParams();
      const original = buildSeries(x => evalBase(p.base, x));
      const pipe = buildPipeline();
      const transformed = buildSeries(x => pipe.evalFn(x));
      const px = Number(els.pointX.value);
      const op = computeOriginalPoint(px);
      const np = computeNewPoint(px);

      const traces = [
        {
          x: original.x,
          y: original.y,
          mode: 'lines',
          name: 'f(x)',
          line: { width: 3 }
        },
        {
          x: transformed.x,
          y: transformed.y,
          mode: 'lines',
          name: 'g(x)',
          line: { width: 4 }
        }
      ];

      if(op){
        traces.push({
          x: [op.x],
          y: [op.y],
          mode: 'markers+text',
          name: 'נקודה מקורית',
          text: [`f(${fmt(op.x)})=${fmt(op.y)}`],
          textposition: 'top center',
          marker: { size: 11, symbol: 'circle' }
        });
      }

      if(np){
        traces.push({
          x: [np.x],
          y: [np.y],
          mode: 'markers+text',
          name: 'נקודה חדשה',
          text: [`g(${fmt(np.x)})=${fmt(np.y)}`],
          textposition: 'bottom center',
          marker: { size: 12, symbol: 'diamond' }
        });
      }

      const layout = {
        autosize:true,
        paper_bgcolor:'rgba(0,0,0,0)',
        plot_bgcolor:'#0d1430',
        font:{color:'#eef2ff', family:'Arial'},
        margin:{l:50, r:20, t:20, b:50},
        xaxis:{
          title:'x',
          zeroline:true,
          zerolinewidth:2,
          gridcolor:'#27345d',
          linecolor:'#41548f',
          mirror:true,
          range:[-10,10]
        },
        yaxis:{
          title:'y',
          zeroline:true,
          zerolinewidth:2,
          gridcolor:'#27345d',
          linecolor:'#41548f',
          mirror:true,
          range:[-12,12]
        },
        legend:{
          orientation:'h',
          yanchor:'bottom',
          y:1.02,
          x:0
        }
      };

      Plotly.newPlot('plot', traces, layout, {
        responsive:true,
        displaylogo:false
      }).then(() => {
        Plotly.Plots.resize(document.getElementById('plot'));
      });
      updateTexts();
    }

    function updateAll(){
      updatePlot();
    }

    window.addEventListener('resize', () => {
      const plotEl = document.getElementById('plot');
      if(plotEl){
        Plotly.Plots.resize(plotEl);
      }
    });

    function setToggleVisuals(){
      els.negYBtn.classList.toggle('active', state.reflectY);
      els.negXBtn.classList.toggle('active', state.reflectX);
      els.absBtn.classList.toggle('active', state.absY);
    }

    function resetAll(){
      els.baseFunc.value = 'quadratic';
      document.querySelectorAll('.func-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.func === 'quadratic');
      });
      els.verticalShift.value = 0;
      els.horizontalShift.value = 0;
      els.verticalScale.value = 1;
      els.horizontalScale.value = 1;
      els.powerN.value = 1;
      els.pointX.value = 1;
      state.reflectY = false;
      state.reflectX = false;
      state.absY = false;
      state.sequenceCounter = 0;
      state.orderMap = {};
      setToggleVisuals();
      updateAll();
    }

    document.querySelectorAll('.func-btn').forEach(btn => {
      btn.addEventListener('click', () => setBaseFunction(btn.dataset.func));
    });

    els.verticalShift.addEventListener('input', () => {
      touchOperation('verticalShift');
      updateAll();
    });

    els.horizontalShift.addEventListener('input', () => {
      touchOperation('horizontalShift');
      updateAll();
    });

    els.verticalScale.addEventListener('input', () => {
      touchOperation('verticalScale');
      updateAll();
    });

    els.horizontalScale.addEventListener('input', () => {
      touchOperation('horizontalScale');
      updateAll();
    });

    els.powerN.addEventListener('input', () => {
      touchOperation('powerN');
      updateAll();
    });

    els.pointX.addEventListener('input', updateAll);

    els.negYBtn.addEventListener('click', () => {
      state.reflectY = !state.reflectY;
      touchOperation('reflectY');
      setToggleVisuals();
      updateAll();
    });

    els.negXBtn.addEventListener('click', () => {
      state.reflectX = !state.reflectX;
      touchOperation('reflectX');
      setToggleVisuals();
      updateAll();
    });

    els.absBtn.addEventListener('click', () => {
      state.absY = !state.absY;
      touchOperation('absY');
      setToggleVisuals();
      updateAll();
    });

    els.resetBtn.addEventListener('click', resetAll);

    resetAll();
  </script>
</body>
</html>
